# .github/workflows/ci.yml
name: CI - Lint, Test, Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'bun'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

    #   - name: Test
    #     run: bun test --passWithNoTests

      - name: Build
        run: bun run build
