name: CI
on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev, feature/*]
jobs:
    lint-and-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Format Check
              run: bun run format

            - name: Build
              run: bun run build
